<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ApenasCorrer - Áudio Treino de Corrida</title>
  <meta name="description" content="Seu treinador de corrida por voz pessoal. Guia de 12 semanas do zero aos 5km offline com música integrada.">
  <meta name="theme-color" content="#ff5a36">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <div id="app-container">
    <!-- Header -->
    <header>
      <div class="logo">
        <!-- Ícone SVG de Tênis/Corrida Rápido -->
        <svg viewBox="0 0 24 24">
          <path d="M21,12C21,12 18,17 14,17C10,17 11,13 8,13C5,13 3,15 3,15M21,12C21,12 18,9 14,9C10,9 11,13 8,13C5,13 3,11 3,11M16,5L19,8M12,5L15,8M8,5L11,8M21,12C21,13.66 19.66,15 18,15C16.34,15 15,13.66 15,12C15,10.34 16.34,9 18,9C19.66,9 21,10.34 21,12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span>ApenasCorrer</span>
      </div>
      <div class="current-status" id="active-phase-indicator">Fase 1 - 2Km</div>
    </header>

    <!-- VIEW 1: CALENDÁRIO DE TREINOS -->
    <main id="view-workouts" class="view active">
      <!-- Seletor de Fases -->
      <div class="phase-selector">
        <button class="phase-btn active" data-phase="1">Fase 1: 2Km</button>
        <button class="phase-btn" data-phase="2">Fase 2: 3Km</button>
        <button class="phase-btn" data-phase="3">Fase 3: 5Km</button>
      </div>

      <!-- Lista de Treinos Dinâmica -->
      <div class="workout-list" id="workout-list-container">
        <!-- Inserido dinamicamente via JS -->
      </div>
    </main>

    <!-- VIEW 2: PLAYER DO TREINO ATIVO (Oculto até iniciar um treino) -->
    <main id="view-player" class="view">
      <div class="player-container">
        <!-- Nome do treino -->
        <div class="player-header">
          <div class="player-workout-title" id="player-week-day">Semana 1 - Segunda</div>
          <div class="player-workout-subtitle" id="player-title">Corrida de 20 min</div>
        </div>

        <!-- Timer Circular -->
        <div class="interval-panel">
          <svg class="timer-ring">
            <circle class="timer-ring-circle-bg" cx="125" cy="125" r="110" />
            <circle class="timer-ring-circle" id="timer-progress" cx="125" cy="125" r="110" stroke-dasharray="691.15" stroke-dashoffset="0" />
          </svg>
          <div class="timer-content">
            <span class="interval-name" id="player-interval-name">AQUECIMENTO</span>
            <span class="interval-timer" id="player-timer">10:00</span>
            <span class="interval-next" id="player-next-step">Próximo: Corrida Leve (1m)</span>
          </div>
        </div>

        <!-- Painel de Áudio & Configurações de Voz/Música -->
        <div class="audio-panel">
          <div class="audio-panel-row">
            <span class="audio-panel-title">Música de Fundo</span>
            <div class="music-selector">
              <button class="music-option active" data-music="electro">Electro</button>
              <button class="music-option" data-music="lofi">Lo-Fi</button>
              <button class="music-option" data-music="none">Mute</button>
            </div>
          </div>
          <div class="audio-panel-row">
            <span class="audio-panel-title">Volume Batidas</span>
            <div class="volume-control">
              <!-- Ícone de Volume Baixo -->
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              </svg>
              <input type="range" class="volume-slider" id="music-volume-slider" min="0" max="1" step="0.05" value="0.4">
            </div>
          </div>
        </div>

        <!-- Controles Principais -->
        <div class="player-controls">
          <!-- Botão Parar Treino -->
          <button class="btn-control-secondary" id="btn-stop-workout" title="Parar Treino">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M6 6h12v12H6V6z"/>
            </svg>
          </button>
          
          <!-- Botão Play/Pause -->
          <button class="btn-control-main" id="btn-play-pause" title="Iniciar/Pausar">
            <svg id="play-pause-icon" viewBox="0 0 24 24" width="34" height="34">
              <!-- Play Icon por padrão -->
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>

          <!-- Botão Pular Intervalo -->
          <button class="btn-control-secondary" id="btn-skip-interval" title="Pular Etapa">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- VIEW 3: HISTÓRICO E PROGRESSO -->
    <main id="view-progress" class="view">
      <!-- Grid de Estatísticas -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Treinos Concluídos</span>
          <span class="stat-val" id="stats-total-runs">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Fase Atual</span>
          <span class="stat-val primary" id="stats-current-phase">1</span>
        </div>
      </div>

      <!-- Lista de Treinos Concluídos -->
      <div class="history-title">
        <span>Histórico de Corridas</span>
        <button class="btn-reset" id="btn-reset-progress">Resetar Progresso</button>
      </div>
      <div class="history-grid" id="history-list-container">
        <!-- Preenchido dinamicamente se houver dados -->
        <div class="history-row" style="justify-content: center; color: var(--text-muted);">
          Nenhum treino concluído ainda. Comece hoje!
        </div>
      </div>
    </main>

    <!-- Barra de Navegação Inferior -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-target="view-workouts">
        <svg viewBox="0 0 24 24">
          <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>
        </svg>
        <span>Calendário</span>
      </button>
      
      <button class="nav-item hidden" id="nav-player-tab" data-target="view-player">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
        <span>No Player</span>
      </button>

      <button class="nav-item" data-target="view-progress">
        <svg viewBox="0 0 24 24">
          <path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zm-6 8h4v6H4v-6zm16 6h-4v-8h4v8z"/>
        </svg>
        <span>Progresso</span>
      </button>
    </nav>
  </div>

  <!-- Toast de notificações -->
  <div class="toast" id="toast-message">Treino concluído com sucesso!</div>

  <!-- Script principal do App -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
